name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r requirements.txt

      - name: Basic import test
        run: python -c "import src.app"

      - name: CLI help check
        run: python run_sleepy_guard.py --help

      # tests to be added
      # - name: Run tests
      #   run: PYTHONPATH=. pytest -v
